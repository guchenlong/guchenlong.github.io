<!DOCTYPE html>
<html>

<head>
    <!-- 编码 -->
    <meta charset="UTF-8">
    <!-- title, keywords, description -->
    <title>首页 | 顾晨龙的个人站</title>
    <meta title="keywords" content="首页 | 顾晨龙的个人站" />
    <meta title="description" content="首页 | 顾晨龙的个人站" />
    <!-- 移动端缩放 -->
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
    <!-- CSS -->
    <link rel="stylesheet" type="text/css" href="./index/index-layout.css" />
    <link rel="stylesheet" type="text/css" href="./index/index-article.css" />
</head>

<body>
    <header onclick="jumpTo('./')">顾晨龙的个人站</header>
    <!-- <nav>首页</nav> -->
    <main>
        <aside id="left-aside"></aside>
        <article id="content"></article>
        <aside id="right-aside"></aside>
    </main>

    <!-- script -->
    <script src="./common/js/common.js"></script>
    <script src="./index/indexData.js"></script>
    <script>
        window.onload = function () {
            init();
        }

        function init() {
            initBaiduTongji(); // 百度统计 上报
            initPage();  // 渲染 - 页面
        }

        // 渲染 - 页面
        function initPage() {
            initLeftAside();  // 渲染 - 左侧 aside
            initRightAside();  // 渲染 - 右侧 aside
            initContent();  // 渲染 - 内容
        }

        function initLeftAside() {
            let leftAsideElement = document.getElementById("left-aside");
            leftAsideElement.innerHTML = "";
            for (let i = 0; i < indexLeftAside.length; i++) {
                let asideBox = document.createElement("div");
                asideBox.className = "aside-box";
                asideBox.innerHTML += `<div>${indexLeftAside[i].title}</div>`;
                for (let j = 0; j < indexLeftAside[i].list.length; j++) {
                    let item = indexLeftAside[i].list[j];
                    asideBox.innerHTML += `<div><a target="_blank" href="${item.link}">${item.title}</a></div>`;
                }
                leftAsideElement.appendChild(asideBox);
            }
        }

        function initRightAside() {
            let rightAsideElement = document.getElementById("right-aside");
            rightAsideElement.innerHTML = "";
            for (let i = 0; i < indexRightAside.length; i++) {
                let asideBox = document.createElement("div");
                asideBox.className = "aside-box";
                asideBox.innerHTML += `<div>${indexRightAside[i].title}</div>`;
                for (let j = 0; j < indexRightAside[i].list.length; j++) {
                    let item = indexRightAside[i].list[j];
                    asideBox.innerHTML += `<div><a target="_blank" href="${item.link}">${item.title}</a></div>`;
                }
                rightAsideElement.appendChild(asideBox);
            }
        }

        // 渲染 - 内容
        function initContent() {
            let contentElement = document.getElementById("content");
            contentElement.innerHTML = "";
            for (let i = 0; i < indexData.length; i++) {
                let section = document.createElement("section");
                let articleLeftElement = document.createElement("div");
                // article-left
                articleLeftElement.className = "article-left";
                articleLeftElement.innerHTML = indexData[i].range;
                section.appendChild(articleLeftElement);
                // article-right
                let articleRightElement = document.createElement("div");
                articleRightElement.className = "article-right";
                for (let j = 0; j < indexData[i].list.length; j++) {
                    let item = indexData[i].list[j];
                    //  background-create
                    articleRightElement.innerHTML += `
                    <div class="${item.isMarked ? 'item background-create' : 'item'}">
                        <div class="item-when">${item.time}</div>
                        <div class="item-where">
                            ${item.locationLink ? `<a target="_blank" href="${item.locationLink}">${item.location}</a>` : item.location}
                        </div>
                        <div class="item-who">
                            ${item.peopleLink ? `<a target="_blank" href="${item.peopleLink}">${item.people}</a>` : item.people}
                        </div>
                        <div class="item-what">
                            ${item.thingLink ? `<a target="_blank" href="${item.thingLink}">${item.thing}</a>` : item.thing}
                        </div>
                    </div>
                    `
                }
                section.appendChild(articleLeftElement);
                section.appendChild(articleRightElement);
                contentElement.appendChild(section);
            }
        }
    </script>
</body>

</html>
