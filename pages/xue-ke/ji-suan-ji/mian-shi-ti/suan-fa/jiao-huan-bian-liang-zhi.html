            <div class="title">不使用第三个变量，交换两个变量的值 （a = 3; b = 4）</div>
            <div class="answer">
                <pre>
                    <code>
function jiao_huan(a, b) {
    a = a + b;  // a = 3 + 4 = 7
    b = a - b;  // b = 7 - 4 = 3
    a = a - b;  // a = 7 - 3 = 4
    console.log(`a = ${a}, b = ${b}`);
}
jiao_huan(3, 4);
                    </code>
