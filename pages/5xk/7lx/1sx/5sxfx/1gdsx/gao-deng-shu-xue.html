<!DOCTYPE html>
<html>

<head>
    <title>高等数学</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        header {
            width: 100%;
            height: 50px;
            line-height: 50px;
            text-align: center;
            border-bottom: 1px solid #ccc;
        }

        main {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        article {
            margin: 50px;
        }

        section {
            display: flex;
            margin: 10px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .left {
            width: 20%;
        }

        .right {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
        }

        .right-item {
            margin: 0 10px;
        }
    </style>
</head>

<body>
    <header>高等数学</header>
    <main>
        <article>
            <!-- 高等数学 -->
            <section>
                <div class="left">1. 高等数学</div>
                <div class="right">
                    <div class="right-item">高等数学</div>
                </div>
            </section>
        </article>
    </main>
</body>

</html>
