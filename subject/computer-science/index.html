                1642 帕斯卡 - 帕斯卡计算器，可做加减，是第一台实用机械计算器。
            </section>
            <!-- 一、机械计算时代（17 世纪 —19 世纪末）：从算盘到可编程雏形
            1. 早期机械计算器（17—18 世纪）
            1642：帕斯卡（Blaise Pascal）发明帕斯卡计算器，可做加减，是第一台实用机械计算器。
            1673：莱布尼茨（Gottfried Leibniz）发明步进计算器（Stepped Reckoner），实现加减乘除四则运算，并提出二进制思想。
            1801：雅卡尔（Joseph Marie Jacquard）发明提花织机，用打孔卡控制图案，是程序存储与自动控制的最早原型。
            2. 巴贝奇与分析机（19 世纪）：现代计算机的思想源头
            1822：巴贝奇（Charles Babbage）设计差分机，用于计算多项式与天文表。
            1834—1837：巴贝奇提出分析机（Analytical Engine），包含存储器、运算器、控制器、输入 / 输出，是第一台通用可编程计算机设计。
            1843：阿达・洛芙莱斯（Ada Lovelace）为分析机编写伯努利数计算程序，被公认为世界第一位程序员。
            二、理论奠基时代（1900—1940）：计算的数学本质被定义
            1. 数理逻辑与可计算性
            1936：图灵（Alan Turing）发表《论可计算数》，提出图灵机（Turing Machine），从数学上定义什么是计算、什么可计算，奠定计算机科学的理论基石。
            1936：丘奇（Alonzo Church）独立提出λ 演算，与图灵机等价，共同定义可计算性。
            1938：香农（Claude Shannon）发表《继电器与开关电路的符号分析》，用布尔代数描述电路，建立数字逻辑基础。
            2. 二战密码与早期电子机器
            1943—1945：英国巨人机（Colossus），世界第一台电子可编程专用计算机，用于破解德军洛伦兹密码。
            1944：美国哈佛 Mark I（IBM ASCC），大型机电计算机，由继电器构成，用于弹道计算。
            三、电子计算机诞生（1940—1950s）：现代计算机的起点
            1. ENIAC：第一台通用电子计算机
            1946.2.14：ENIAC（电子数字积分计算机）在宾夕法尼亚大学诞生，由1.8 万个电子管组成，占地 170㎡，重 30 吨，每秒 5000 次加法，用于弹道计算。
            局限：无存储程序，编程需插拔线路、拨开关，耗时数天。
            2. 冯・诺依曼架构：现代计算机的标准设计
            1945：冯・诺依曼（John von Neumann）发表《关于 EDVAC 的报告草案》，提出冯・诺依曼架构：
            采用二进制
            存储程序（指令与数据同存内存）
            五大部件：运算器、控制器、存储器、输入、输出
            该架构沿用至今，被称为计算机的 “圣经”。
            3. 第一代计算机（电子管时代，1946—1957）
            核心元件：电子管
            代表：ENIAC、EDVAC、IBM 701
            特点：体积巨大、耗电高、可靠性差、仅用于科研 / 军事。
            四、晶体管与集成电路时代（1950s—1970s）：小型化与性能爆发
            1. 晶体管革命（1947—1950s）
            1947.12：贝尔实验室巴丁、布拉顿、肖克利发明晶体管，替代电子管，体积缩小、功耗降低、寿命延长，是20 世纪最伟大发明之一。
            1954：贝尔实验室推出全晶体管计算机 TRADIC，标志 ** 第二代计算机（晶体管时代）** 开始。
            2. 集成电路（IC）与摩尔定律（1958—1970s）
            1958：基尔比（德州仪器）与诺伊斯（仙童）分别发明集成电路（IC），将多个晶体管 / 元件集成在单晶硅片上。
            1965：戈登・摩尔（Intel）提出摩尔定律：集成电路上的晶体管数每 18—24 个月翻一番，性能提升、成本下降，主导半导体发展 50 余年。
            1964：IBM 发布System/360，首台兼容系列计算机，奠定大型机标准，标志 ** 第三代计算机（集成电路时代）** 到来。
            3. 软件与系统的诞生
            1957：FORTRAN（IBM）诞生，第一个高级编程语言，解决机器码编程难题。
            1960s：COBOL、ALGOL、LISP相继出现，操作系统雏形（IBM OS/360）、分时系统（MIT CTSS）、**UNIX（1969，贝尔实验室）** 诞生。
            1968：“软件危机” 爆发，提出软件工程概念，解决大型程序可靠性与维护问题。
            五、微处理器与个人计算机革命（1971—1990s）：计算机走向大众
            1. 微处理器：计算机 “心脏” 微型化
            1971：Intel 推出4004，世界第一个微处理器（4 位，2300 晶体管），将 CPU 集成在单芯片上。
            1974：Intel 8080（8 位），成为个人电脑的标准 CPU。
            2. 个人电脑（PC）爆发
            1975：Altair 8800（MITS），第一台商用个人电脑，基于 8080，开启 DIY 时代。
            1976：乔布斯、沃兹尼亚克创立苹果，推出Apple I；1977 年Apple II成为首款成功的消费级 PC。
            1981：IBM 发布IBM PC（5150），采用 Intel 8088 与MS-DOS（微软），确立 PC 标准，Wintel 联盟形成。
            1984：苹果Macintosh，首台图形界面（GUI）+ 鼠标的大众电脑，颠覆人机交互。
            3. 图形与交互革命（施乐 PARC）
            1970s：施乐 PARC 发明GUI、鼠标、以太网、激光打印机、面向对象编程（Smalltalk），奠定现代计算机交互基础。
            六、互联网与万维网时代（1960s—2000s）：从孤立到全球互联
            1. 互联网前身：ARPANET
            1969：美国国防部ARPANET诞生，连接 4 所大学，采用分组交换技术，是互联网的起点。
            1974：TCP/IP 协议（文顿・瑟夫、罗伯特・卡恩）提出，成为互联网通信标准。
            1983：ARPANET 全面切换TCP/IP，互联网正式诞生。
            2. 万维网（WWW）：信息普惠
            1989：蒂姆・伯纳斯 - 李（CERN）发明万维网（WWW），提出HTML、HTTP、URL，并发布首个浏览器与服务器。
            1993：Mosaic（伊利诺伊大学），首个图形化浏览器，推动互联网普及。
            1995：Netscape、IE浏览器大战；Amazon、eBay上线，电子商务起步；Java（Sun）发布，跨平台编程革命。
            七、移动计算与人工智能时代（2000s— 至今）：智能与泛在计算
            1. 移动互联网革命
            2007：苹果iPhone发布，多点触控 + App Store，开启智能手机时代。
            2008：谷歌Android系统开源，形成移动生态双雄。
            移动芯片：ARM 架构主导，高通、苹果、华为海思崛起。
            2. 大数据、云计算与 AI 复兴
            2000s 后：大数据（海量数据处理）、云计算（AWS、阿里云、Azure）、分布式系统（Hadoop、Spark）成为基础设施。
            AI 复兴（2010s）：
            2012：**AlexNet（Hinton 团队）** 在 ImageNet 夺冠，深度学习爆发。
            2016：**AlphaGo（DeepMind）** 战胜李世石，强化学习突破。
            2017：**Transformer（Vaswani 等）提出，奠定大语言模型（LLM）** 基础。
            2020s：GPT、BERT、文心一言、Llama等大模型涌现，AI 进入通用智能时代。
            八、计算机科学里程碑人物（核心）
            查尔斯・巴贝奇：分析机之父，现代计算机设计思想奠基人。
            阿达・洛芙莱斯：第一位程序员。
            艾伦・图灵：计算机科学之父、人工智能之父，图灵机与图灵测试提出者。
            冯・诺依曼：现代计算机架构之父。
            克劳德・香农：信息论之父，数字逻辑奠基人。
            戈登・摩尔：摩尔定律提出者，Intel 创始人。
            蒂姆・伯纳斯 - 李：万维网发明者。
            文顿・瑟夫 / 罗伯特・卡恩：互联网之父（TCP/IP）。 -->
